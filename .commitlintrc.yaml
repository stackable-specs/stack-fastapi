# Conventional Commits enforcement per ADR-007 / conventional-commits.md.
# Run locally as a `commit-msg` hook (rule 19) and in CI on every commit of a
# PR (rule 18).
extends:
  - "@commitlint/config-conventional"
rules:
  # Allowed type vocabulary per rule 2.
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
  type-case: [2, always, lower-case]
  scope-case: [2, always, lower-case]
  subject-empty: [2, never]
  subject-full-stop: [2, never, "."]
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case
  header-max-length: [2, always, 72]
  body-leading-blank: [2, always]
  footer-leading-blank: [2, always]
