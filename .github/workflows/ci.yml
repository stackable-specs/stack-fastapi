name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.5.11"
  PYTHON_VERSION: "3.12"

jobs:
  commitlint:
    # ADR-007 / conventional-commits rule 18
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-save @commitlint/cli @commitlint/config-conventional
      - name: Lint commits in this PR
        run: |
          npx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose

  prek:
    # ADR-018 / prek rule 11 — single CI gate that mirrors local hooks.
    # Transitively runs Trunk (ADR-012 / trunk-code-quality rule 10) as a
    # local hook configured in prek.toml.
    name: prek run --all-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --locked --group dev
      - name: Install pinned prek
        # ADR-018 / prek rule 2 — pin the CLI version on every CI run.
        run: uv tool install prek==0.0.6
      - name: Cache prek hook envs
        # prek rule 13 — key on the config file.
        uses: actions/cache@v4
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('prek.toml') }}
          restore-keys: |
            prek-${{ runner.os }}-
      - name: Run prek
        run: uv tool run prek run --all-files --show-diff-on-failure

  unit:
    # ADR-009 / unit-testing rule 12
    name: Unit + property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --locked --group test --group dev
      - name: Run unit + property tests
        run: uv run pytest tests/unit tests/property --cov --cov-fail-under=80
      - run: uv cache prune --ci

  integration:
    # ADR-010 / integration-testing rule 11
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --locked --group test --group dev
      - name: Run integration tests
        run: uv run pytest tests/integration -m integration
      - run: uv cache prune --ci

  openapi:
    # ADR-004 / openapi rules 5, 6
    name: OpenAPI lint + diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Spectral
        run: npm install --no-save @stoplight/spectral-cli@6.14.2
      - name: Lint openapi.yaml
        run: npx spectral lint openapi.yaml --fail-severity=warn
      - name: Install oasdiff
        run: |
          curl -fsSL https://github.com/Tufin/oasdiff/releases/download/v1.10.27/oasdiff_1.10.27_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin oasdiff
      - name: Diff against base
        if: github.event_name == 'pull_request'
        run: |
          git show "${{ github.event.pull_request.base.sha }}:openapi.yaml" > base.openapi.yaml || exit 0
          oasdiff breaking base.openapi.yaml openapi.yaml --fail-on ERR

  docs:
    # ADR-017 / pdoc rule 16
    name: pdoc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv python install ${{ env.PYTHON_VERSION }}
      - run: uv sync --locked --group docs
      - name: Build API reference
        run: uv run pdoc --docformat google --output-directory _docs-check app
      - run: uv cache prune --ci

  build-image:
    # ADR-015 / docker rules 14, 18; ADR-013 / sbom rules 1, 5
    name: Build image + SBOM + scan
    runs-on: ubuntu-latest
    needs: [prek, unit]
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: python-uv-app:${{ github.sha }}
          provenance: true
          sbom: true
      - name: Generate CycloneDX SBOM for the build context
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: python-uv-app:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
