# Trunk Code Quality (ADR-012). Pinned versions per trunk-code-quality rules
# 2 and 3. Upgrade with `trunk upgrade` (rule 4); never hand-edit versions.
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - python@3.10.8
    - node@22.16.0
lint:
  enabled:
    # Python (rule 5). mypy runs via `uv run mypy` (Makefile + CI typecheck job)
    # because Trunk's isolated mypy runtime cannot see the project's uv venv.
    - ruff@0.15.12
    # YAML / Markdown / Docker / Compose / Shell (rule 7)
    - yamllint@1.38.0
    - markdownlint@0.48.0
    - hadolint@2.14.0
    - shellcheck@0.11.0
    - shfmt@3.6.0
    # Secret detection (rule 6)
    - trufflehog@3.95.2
    - gitleaks@8.30.1
    # Misc
    - actionlint@1.7.12
    - checkov@3.2.524
    - osv-scanner@2.3.5
    - prettier@3.8.3
  ignore:
    - linters: [ALL]
      paths:
        - .venv/**
        - docs-site/**
        - .trunk/out/**
        - uv.lock
        - docs/specs/**
        - docs/adr/**
        - docs/bdr/**
    # Markdown line-length is noisy on long-form spec/ADR prose; the canonical
    # specs are already linted in the source repo.
    - linters: [markdownlint]
      paths:
        - "**/*.md"
    # checkov's OpenAPI policies (CKV_OPENAPI_*) flag missing global security
    # and missing array maxItems; the reference scaffold has no auth surface
    # and these policies don't reflect the spec rules we actually enforce.
    - linters: [checkov]
      paths:
        - openapi.yaml
actions:
  # ADR-018 / prek rule 16 — git-hook ownership lives in prek.toml. Trunk's own
  # hook actions (trunk-check-pre-push, trunk-fmt-pre-commit) are intentionally
  # NOT enabled here; prek invokes `trunk check` / `trunk fmt` as local hooks.
  enabled:
    - trunk-announce
    - trunk-upgrade-available
