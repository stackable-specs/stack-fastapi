# Auto-loaded by `docker compose up` for local development (docker-compose
# rule 21). Production layers `compose.yaml` with an explicit
# `compose.prod.yaml` instead of inheriting these overrides.
services:
  api:
    # Live-reload from the host source tree — development-only (rule 10).
    volumes:
      - ./src:/app/src:ro
    environment:
      APP_DOCS_ENABLED: "true"
      APP_LOG_LEVEL: DEBUG
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
